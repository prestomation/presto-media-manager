name: Emulator E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM acceleration for a usable emulator on GitHub-hosted runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Accept SDK licenses and pre-install emulator
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "emulator" "platform-tools" >/dev/null

      # Gradle Managed Device (Automated Test Device, headless). AGP provisions the
      # aosp-atd;x86_64 image for API 34 and runs connected tests against it.
      - name: Run instrumented tests on managed device (ATD API 34)
        run: ./gradlew :app:atdApi34DebugAndroidTest --no-daemon

      - name: Upload instrumentation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-report
          path: app/build/reports/androidTests/**
