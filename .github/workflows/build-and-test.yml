name: Build & Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: JVM unit + screenshot verification
        run: ./gradlew :app:verifyRoborazziDebug

      - name: Static analysis (detekt + Android Lint)
        run: ./gradlew :app:detekt :app:lintDebug

      - name: Coverage report
        run: ./gradlew :app:koverXmlReportDebug :app:koverLogDebug

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage
          path: app/build/reports/kover/**

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: presto-media-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload screenshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: |
            app/build/outputs/roborazzi/**
            screenshots/**

      - name: Post screenshot gallery comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dir = 'screenshots';
            if (!fs.existsSync(dir)) return;
            const branch = context.payload.pull_request.head.ref;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort();
            const shortName = f => f.replace(/^.*ScreenshotTests\./, '').replace(/\.png$/, '');
            let body = '## 📸 UI screenshots\n\nGolden screenshots for this PR (rendered by Roborazzi):\n\n';
            for (const f of files) {
              const raw = `https://raw.githubusercontent.com/${repo}/${branch}/${dir}/${encodeURIComponent(f)}`;
              body += `**${shortName(f)}**\n\n<img src="${raw}" width="280">\n\n`;
            }
            body += '_Changed a screen? Run `./gradlew recordRoborazziDebug` and commit the updated PNGs — CI fails until the goldens match._';
            const marker = '<!-- presto-screenshot-gallery -->';
            body += `\n${marker}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
